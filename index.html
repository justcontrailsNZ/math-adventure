<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Math Adventure NZ</title>
<!-- Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');

body {
    font-family: 'Fredoka', 'Comic Sans MS', sans-serif;
    text-align: center;
    margin: 0;
    padding: 15px 10px;
    background: #e9f6ff;
    transition: background 0.5s ease;
    touch-action: manipulation;
}

#gameContainer {
    background: rgba(255, 255, 255, 0.95);
    max-width: 420px;
    margin: 0 auto;
    padding: 25px 15px;
    border-radius: 25px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.15);
}

h1 { margin-top: 0; font-size: 30px; color: #333; }

/* PS5 Bank Styling */
#ps5Bank {
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    color: white;
    padding: 12px 15px;
    border-radius: 15px;
    margin: 0 auto 15px auto;
    display: flex;
    justify-content: center; 
    align-items: center;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    border: 3px solid #fff;
    width: 90%;
    transition: transform 0.2s, background 0.3s;
}
.ps5-text { font-size: 22px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
.ps5-mins { color: #00ffcc; font-size: 26px; text-shadow: 0 0 5px rgba(0,255,204,0.5); }

@keyframes pulseBank {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); background: #4CAF50; border-color: #4CAF50;}
    100% { transform: scale(1); }
}
.pulse-anim { animation: pulseBank 0.5s ease; }


.controls-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 10px;
}

select, button {
    font-family: 'Fredoka', 'Comic Sans MS', sans-serif;
    font-size: 16px;
    padding: 10px;
    border-radius: 10px;
    border: 2px solid #ccc;
    cursor: pointer;
    outline: none;
    background: white;
}

select:focus { border-color: #4CAF50; }

#startBtn {
    background: #4CAF50; color: white; font-size: 20px; font-weight: bold; 
    border: none; padding: 12px 30px; border-radius: 15px;
    box-shadow: 0 5px 0 #388E3C; transition: all 0.1s;
    width: 90%; margin-top: 10px;
}
#startBtn:active { transform: translateY(5px); box-shadow: 0 0 0 #388E3C; }

/* Status Bar & Pet Display */
.status-bar { display: flex; justify-content: space-between; align-items: center; margin: 20px 15px 10px; font-weight: 600; color: #555;}
#petContainer { display: flex; align-items: center; gap: 8px; font-size: 18px; color: #4CAF50; background: #e8f5e9; padding: 5px 12px; border-radius: 12px; border: 2px solid #81c784; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
#petEmoji { font-size: 28px; display: inline-block; }
#streak { font-size: 18px; color: #ff8c00; }

@keyframes popPet {
    0% { transform: scale(1); }
    50% { transform: scale(1.4) rotate(10deg); }
    100% { transform: scale(1) rotate(0deg); }
}
.pop-anim { animation: popPet 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

#xpBarContainer { width: 90%; height: 22px; background: #eee; margin: 0 auto; border-radius: 12px; border: 2px solid #ccc; overflow: hidden; }
#xpBar { height: 100%; width: 0%; background: limegreen; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

/* Play Area */
.play-area { margin: 25px 0; min-height: 120px; }
#question { font-size: 36px; font-weight: bold; color: #222; margin: 0; display: inline-block; }
#speakerBtn { background: none; border: none; font-size: 28px; cursor: pointer; margin-left: 10px; padding: 0; transition: transform 0.2s; }
#speakerBtn:hover { transform: scale(1.1); }
#speakerBtn:active { transform: scale(0.9); }

#answer { 
    font-size: 32px; width: 180px; text-align: center; border: 3px solid #ccc; 
    border-radius: 12px; padding: 10px; margin-top: 15px; outline: none;
    font-family: 'Fredoka', sans-serif; font-weight: bold; color: #333;
    transition: all 0.2s ease;
}

/* Animations */
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    50% { transform: translateX(6px); }
    75% { transform: translateX(-6px); }
}
.input-wrong { animation: shake 0.3s; border-color: #ff4d4d !important; background: #ffe6e6 !important; color: #c00 !important; }
.input-correct { border-color: #4CAF50 !important; background: #e6ffe6 !important; color: #2e7d32 !important; transform: scale(1.05); }

#reward { font-size: 24px; height: 30px; font-weight: bold; margin-top: 10px; }
#correction { color: #d32f2f; height: 25px; font-weight: bold; font-size: 20px; }

/* Keypad */
#keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; justify-content: center; margin: 20px auto; width: 95%; }
.key {
    font-size: 26px; font-weight: bold; padding: 15px 0; background: white;
    border-radius: 12px; border: 2px solid #bbb; cursor: pointer;
    box-shadow: 0px 5px 0px #bbb; transition: transform 0.1s, box-shadow 0.1s;
    user-select: none; color: #333;
}
.key:active { transform: translateY(5px); box-shadow: 0px 0px 0px #bbb; }
.key-clear { background: #ffcccc; color: #c00; border-color: #d99; box-shadow: 0px 5px 0px #d99; }
.key-del { background: #ffdd99; color: #b37700; border-color: #d9b366; box-shadow: 0px 5px 0px #d9b366; }

#submitBtn {
    background: #2196F3; color: white; font-weight: bold; font-size: 22px; 
    padding: 12px 0; width: 95%; cursor: pointer; border-radius: 15px; border: none;
    box-shadow: 0 5px 0 #1976D2; margin-top: 5px; transition: all 0.1s;
}
#submitBtn:active { transform: translateY(5px); box-shadow: 0 0 0 #1976D2; }

/* Footers */
.bottom-stats { display: flex; justify-content: space-between; margin-top: 25px; padding: 0 15px; font-weight: bold; font-size: 18px; color: #555; }
#timer { font-weight: bold; font-size: 18px; margin-top: 15px; color: #666; background: #eee; display: inline-block; padding: 8px 15px; border-radius: 15px; }

/* Themes */
.theme-jace-btn { background: #ff4500 !important; box-shadow: 0 5px 0 #cc3700 !important; }
.theme-jace-btn:active { box-shadow: 0 0 0 #cc3700 !important; }
.theme-clariza-btn { background: #ff69b4 !important; box-shadow: 0 5px 0 #d1478e !important; }
.theme-clariza-btn:active { box-shadow: 0 0 0 #d1478e !important; }

/* Modals (Game Over & Loot Chest) */
.full-modal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8); z-index: 1000;
    display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);
}
.modal-box {
    background: white; padding: 35px 25px; border-radius: 25px; text-align: center;
    max-width: 85%; width: 340px; box-shadow: 0px 15px 30px rgba(0,0,0,0.5);
    border: 6px solid #ffcc00; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

/* Specific Loot Chest Styles */
#chestEmoji { font-size: 80px; margin: 10px 0; cursor: pointer; transition: transform 0.2s; display: inline-block; user-select: none; }
#chestEmoji:hover { transform: scale(1.1); }
@keyframes chestShake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-10deg); } 75% { transform: rotate(10deg); } }
.shake-anim { animation: chestShake 0.4s infinite; }
#chestResult { font-size: 26px; font-weight: bold; color: #ff8c00; margin: 15px 0; display: none; }

</style>
</head>
<body>

<div id="gameContainer">
    <h1 id="gameTitle">🌟 Math Adventure</h1>

    <!-- PS5 TIME BANK -->
    <div id="ps5Bank">
        <div class="ps5-text">🎮 Earned PS5 Time: <span class="ps5-mins" id="ps5TimeDisplay">0</span> mins</div>
    </div>

    <div class="controls-row">
        <select id="player" onchange="applyTheme()">
            <option value="clariza">Clariza (Year 2)</option>
            <option value="jace">Jace (Year 4)</option>
        </select>
        <select id="mode" onchange="updateHighScoresDisplay()">
            <option value="10q">10 Questions</option>
            <option value="20q">20 Questions</option>
            <option value="timed">Timed (60s)</option>
            <option value="practice">Practice</option>
        </select>
    </div>
    <div class="controls-row">
        <select id="topic" style="width: 90%;">
            <option value="mixed">🔀 Surprise Mix!</option>
            <option value="addition">➕ Addition</option>
            <option value="subtraction">➖ Subtraction</option>
            <option value="multiplication">✖️ Multiplication</option>
            <option value="division">➗ Division</option>
            <option value="fractions">🍕 Fractions</option>
            <option value="money">💰 Money (NZD)</option>
            <option value="time">⏱️ Time</option>
            <option value="patterns">🔢 Patterns</option>
            <option value="geometry">🔺 Geometry</option>
            <option value="measurement">📏 Measurement</option>
            <option value="rounding">🔄 Rounding</option>
            <option value="logic">🧠 Logic</option>
        </select>
    </div>

    <button id="startBtn" onclick="startGame()">Start Adventure! 🚀</button>

    <div class="status-bar">
        <!-- VIRTUAL PET CONTAINER -->
        <div id="petContainer">
            <span id="petEmoji">🥚</span>
            <span id="petLabel">Level 1</span>
        </div>
        <div id="streak">Streak: 0 🔥</div>
    </div>
    
    <div id="xpBarContainer"><div id="xpBar"></div></div>

    <div class="play-area">
        <div style="display:flex; justify-content:center; align-items:center;">
            <div id="question">Press Start! 🚀</div>
            <button id="speakerBtn" onclick="speakQuestion()" title="Read Out Loud">🔊</button>
        </div>

        <input id="answer" autocomplete="off" readonly placeholder="?">
        
        <div id="reward"></div>
        <div id="correction"></div>
    </div>

    <div id="keypad">
        <div class="key" onclick="addNumber('1')">1</div>
        <div class="key" onclick="addNumber('2')">2</div>
        <div class="key" onclick="addNumber('3')">3</div>
        <div class="key key-clear" onclick="clearAnswer()">C</div>
        
        <div class="key" onclick="addNumber('4')">4</div>
        <div class="key" onclick="addNumber('5')">5</div>
        <div class="key" onclick="addNumber('6')">6</div>
        <div class="key key-del" onclick="backspace()">⌫</div>
        
        <div class="key" onclick="addNumber('7')">7</div>
        <div class="key" onclick="addNumber('8')">8</div>
        <div class="key" onclick="addNumber('9')">9</div>
        <div class="key" onclick="addNumber('.')">.</div>

        <div style="visibility:hidden;"></div>
        <div class="key" onclick="addNumber('0')">0</div>
        <div style="visibility:hidden;"></div>
        <div class="key" onclick="addNumber(':')">:</div>
    </div>

    <button id="submitBtn" onclick="submitAnswer()">Submit ✅</button>

    <div id="timer">Choose mode & press Start</div>

    <div class="bottom-stats">
        <div id="score">Score: 0</div>
        <div id="highScoreDisplay">Best: 0 🏆</div>
    </div>
</div>

<!-- Victory Modal -->
<div id="gameOverModal" class="full-modal">
    <div class="modal-box">
        <h2 id="modalTitle" style="font-size:30px; margin-top:0; color:#333;">Game Over!</h2>
        <div id="modalStars" style="font-size:55px; margin:10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.2);">⭐⭐⭐</div>
        <p id="modalScoreText" style="font-size:22px; font-weight:bold; color:#555;">You scored X points!</p>
        <button id="playAgainBtn" class="theme-clariza-btn" style="margin-top:15px; padding: 12px 25px;" onclick="closeModal()">Play Again 🔄</button>
    </div>
</div>

<!-- Mystery Chest Modal -->
<div id="chestModal" class="full-modal">
    <div class="modal-box" style="border-color: #9c27b0;">
        <h2 style="font-size:28px; margin-top:0; color:#9c27b0;">LEVEL UP! 🎉</h2>
        <p style="font-size:18px; color:#666; font-weight:bold; margin-bottom:5px;">Your pet is growing!<br>Tap the chest for a reward!</p>
        
        <div id="chestEmoji" class="shake-anim" onclick="unlockChest()">🎁</div>
        <div id="chestResult">You found +5 Mins!</div>
        
        <button id="chestBtn" onclick="unlockChest()" style="background:#9c27b0; color:white; font-size:20px; font-weight:bold; padding:12px 25px; border-radius:15px; border:none; box-shadow: 0 5px 0 #6a1b9a; margin-top:10px; cursor:pointer;">Open! 🗝️</button>
    </div>
</div>

<script>
let score = 0, xp = 0, levelNumber = 1, streak = 0, questionsAnswered = 0;
let correctAnswer = 0, player = "", levelType = "", topic = "", mode = "";
let currentQuestionTopic = ""; 
let timeLeft = 60, timerInterval = null;
let currentSpeechText = "";
let isGameOverState = true; 
let isProcessing = false;

const allTopics = ["addition", "subtraction", "multiplication", "division", "fractions", "money", "time", "patterns", "geometry", "measurement", "rounding", "logic"];

// --- GAME DATA & PS5 BANK ---
let highScores = JSON.parse(localStorage.getItem("mathGameHighScoresV2")) || { clariza: { timed: 0, "10q": 0, "20q": 0 }, jace: { timed: 0, "10q": 0, "20q": 0 } };
let ps5Data = JSON.parse(localStorage.getItem("mathGamePS5Bank")) || { clariza: 0, jace: 0, lastReset: Date.now() };

if(highScores.clariza["20q"] === undefined) highScores.clariza["20q"] = 0;
if(highScores.jace["20q"] === undefined) highScores.jace["20q"] = 0;

function checkWeeklyReset() {
    if (!ps5Data.lastReset) ps5Data.lastReset = Date.now();
    let lastDate = new Date(ps5Data.lastReset);
    let recentSunday = new Date();
    recentSunday.setHours(0,0,0,0);
    recentSunday.setDate(recentSunday.getDate() - recentSunday.getDay());

    if (lastDate.getTime() < recentSunday.getTime()) {
        ps5Data.clariza = 0; ps5Data.jace = 0; ps5Data.lastReset = Date.now();
        localStorage.setItem("mathGamePS5Bank", JSON.stringify(ps5Data));
    }
}

function updatePS5Display() {
    let p = document.getElementById("player").value;
    document.getElementById("ps5TimeDisplay").innerText = ps5Data[p] || 0;
}

let clarizaRewards = ["Magic! 🦄", "Wackadoo! 🐶", "Sparkly! ✨", "Hooray! 🌈", "Super! 🎈"];
let jaceRewards = ["Roar-some! 🦖", "Turbo Speed! 🏎️", "Vroom! 🏁", "Dino-mite! 🦕", "On Fire! 🔥"];
let currentRewards = [];

// --- AUDIO EFFECTS ---
const sfx = {
    clarizaWin: new Audio("https://assets.mixkit.co/active_storage/sfx/1936/1936-preview.mp3"),
    clarizaLose: new Audio("https://assets.mixkit.co/active_storage/sfx/2840/2840-preview.mp3"),
    jaceWin: new Audio("https://assets.mixkit.co/active_storage/sfx/1466/1466-preview.mp3"),
    jaceLose: new Audio("https://assets.mixkit.co/active_storage/sfx/2951/2951-preview.mp3")
};
Object.values(sfx).forEach(a => a.volume = 0.4);

function playSound(type) {
    let p = document.getElementById("player").value;
    try {
        if (p === "clariza") {
            if (type === "win") { sfx.clarizaWin.currentTime = 0; sfx.clarizaWin.play(); }
            else { sfx.clarizaLose.currentTime = 0; sfx.clarizaLose.play(); }
        } else {
            if (type === "win") { sfx.jaceWin.currentTime = 0; sfx.jaceWin.play(); }
            else { sfx.jaceLose.currentTime = 0; sfx.jaceLose.play(); }
        }
    } catch(e) {} 
}

function rand(max) { return Math.floor(Math.random() * max); }

function applyTheme() {
    let p = document.getElementById("player").value;
    let startBtn = document.getElementById("startBtn");
    let submitBtn = document.getElementById("submitBtn");
    let xpBar = document.getElementById("xpBar");
    let playAgainBtn = document.getElementById("playAgainBtn");

    if (p === "clariza") {
        document.body.style.background = "linear-gradient(135deg, #A1C4FD 0%, #ffafbd 100%)";
        document.getElementById("gameTitle").innerText = "🦄 Clariza's Math 🐶";
        currentRewards = clarizaRewards;
        xpBar.style.background = "linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3)";
        startBtn.className = "theme-clariza-btn"; submitBtn.className = "theme-clariza-btn"; playAgainBtn.className = "theme-clariza-btn";
    } else {
        document.body.style.background = "linear-gradient(135deg, #f12711 0%, #f5af19 100%)";
        document.getElementById("gameTitle").innerText = "🦖 Jace's Math 🏎️";
        currentRewards = jaceRewards;
        xpBar.style.background = "repeating-linear-gradient(45deg, #000, #000 10px, #fff 10px, #fff 20px)";
        startBtn.className = "theme-jace-btn"; submitBtn.className = "theme-jace-btn"; playAgainBtn.className = "theme-jace-btn";
    }
    updateHighScoresDisplay();
    updatePS5Display(); 
    updatePet(); // Update the egg/pet visually on load
}

// --- VIRTUAL PET LOGIC ---
function updatePet() {
    let p = document.getElementById("player").value;
    let petEl = document.getElementById("petEmoji");
    let labelEl = document.getElementById("petLabel");
    let petStr = "🥚";

    if (p === "clariza") {
        if (levelNumber === 1) petStr = "🥚";
        else if (levelNumber === 2) petStr = "🐣";
        else if (levelNumber === 3) petStr = "🦄";
        else if (levelNumber === 4) petStr = "🦄✨";
        else petStr = "🦄👑";
    } else {
        if (levelNumber === 1) petStr = "🥚";
        else if (levelNumber === 2) petStr = "🦎";
        else if (levelNumber === 3) petStr = "🦖";
        else if (levelNumber === 4) petStr = "🦖🔥";
        else petStr = "🦖🕶️";
    }

    petEl.innerText = petStr;
    labelEl.innerText = "Level " + levelNumber;

    // Trigger visual pop
    petEl.classList.remove("pop-anim");
    void petEl.offsetWidth; 
    petEl.classList.add("pop-anim");
}


function updateHighScoresDisplay() {
    let p = document.getElementById("player").value;
    let m = document.getElementById("mode").value;
    let scoreToShow = (m === "practice") ? "-" : (highScores[p][m] || 0);
    document.getElementById("highScoreDisplay").innerText = "Best: " + scoreToShow + " 🏆";
}

function startGame() {
    isGameOverState = false;
    isProcessing = false;
    player = document.getElementById("player").value;
    topic = document.getElementById("topic").value;
    mode = document.getElementById("mode").value;
    levelType = player === "clariza" ? "young" : "older";
    
    score = 0; xp = 0; levelNumber = 1; streak = 0; timeLeft = 60; questionsAnswered = 1;
    clearInterval(timerInterval);
    
    checkWeeklyReset(); 

    document.getElementById("answer").className = ""; 
    applyTheme();
    updateDisplays();
    newQuestion();
    
    if (mode === "timed") {
        document.getElementById("timer").innerText = "⏳ Time: " + timeLeft;
        timerInterval = setInterval(updateTimer, 1000);
    } else if (mode === "10q" || mode === "20q") {
        let maxQs = (mode === "10q") ? 10 : 20;
        document.getElementById("timer").innerText = "📋 Question 1 / " + maxQs;
    } else {
        document.getElementById("timer").innerText = "🎯 Practice Mode";
    }
}

function updateTimer() {
    if (isGameOverState) return;
    timeLeft--;
    document.getElementById("timer").innerText = "⏳ Time: " + timeLeft;
    if (timeLeft <= 0) {
        clearInterval(timerInterval);
        triggerGameOver();
    }
}

function triggerGameOver() {
    isGameOverState = true;
    let p = document.getElementById("player").value;
    let isHighScore = false; let stars = "⭐"; let title = "Great Try!"; let scoreText = "";

    if (mode === "timed") {
        if (score > highScores[p].timed) {
            highScores[p].timed = score; localStorage.setItem("mathGameHighScoresV2", JSON.stringify(highScores));
            isHighScore = true; title = "🎉 NEW RECORD! 🎉"; stars = "⭐⭐⭐"; scoreText = "Amazing! You scored " + score + " points!";
        } else {
            if(score >= 15) stars = "⭐⭐⭐"; else if(score >= 5) stars = "⭐⭐";
            title = "Time's Up!"; scoreText = "Final Score: " + score;
        }
    } else if (mode === "10q" || mode === "20q") {
        let totalQs = (mode === "10q") ? 10 : 20;
        if (score > highScores[p][mode]) {
            highScores[p][mode] = score; localStorage.setItem("mathGameHighScoresV2", JSON.stringify(highScores));
            isHighScore = true;
        }
        scoreText = "You got " + score + " out of " + totalQs + " right!";
        if(score === totalQs) { stars = "⭐⭐⭐"; title = "Perfect! 🏆"; isHighScore = true; }
        else if(score >= (totalQs * 0.7)) { stars = "⭐⭐"; title = "Awesome Job!"; }
        else { stars = "⭐"; title = "Good Practice!"; }
    } else {
        title = "Practice Finished!"; scoreText = "Questions Answered: " + score; stars = "⭐⭐⭐";
    }

    updateHighScoresDisplay();
    document.getElementById("modalTitle").innerText = title;
    document.getElementById("modalStars").innerText = stars;
    document.getElementById("modalScoreText").innerText = scoreText;
    document.getElementById("gameOverModal").style.display = "flex";

    if (isHighScore) {
        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, zIndex: 2000 });
        setTimeout(() => confetti({ particleCount: 100, spread: 100, origin: { y: 0.5 }, zIndex: 2000 }), 500);
    }
}

function closeModal() {
    document.getElementById("gameOverModal").style.display = "none";
    document.getElementById("timer").innerText = "Choose mode & press Start";
    document.getElementById("question").innerText = "Press Start! 🚀";
    document.getElementById("reward").innerText = "";
    document.getElementById("correction").innerText = "";
    document.getElementById("answer").value = "";
    isGameOverState = true;
}

// --- MYSTERY CHEST LOGIC ---
let chestIsOpened = false;

function showChestModal() {
    isProcessing = true; // Lock the game in the background
    if (mode === "timed") clearInterval(timerInterval); // PAUSE the timer so they don't lose time!
    
    chestIsOpened = false;
    document.getElementById("chestEmoji").innerText = "🎁";
    document.getElementById("chestEmoji").classList.add("shake-anim");
    document.getElementById("chestResult").style.display = "none";
    document.getElementById("chestBtn").innerText = "Open! 🗝️";
    document.getElementById("chestBtn").onclick = unlockChest;
    document.getElementById("chestEmoji").onclick = unlockChest;
    
    document.getElementById("chestModal").style.display = "flex";
}

function unlockChest() {
    if (chestIsOpened) return;
    chestIsOpened = true;

    // Loot Box Math! Most likely 5, sometimes 10, rarely 15.
    let randNum = Math.random();
    let bonusMins = 5;
    if (randNum > 0.90) bonusMins = 15; // 10% chance for Jackpot
    else if (randNum > 0.70) bonusMins = 10; // 20% chance for Epic

    // Update Bank
    let p = document.getElementById("player").value;
    ps5Data[p] += bonusMins;
    localStorage.setItem("mathGamePS5Bank", JSON.stringify(ps5Data));
    updatePS5Display();

    // Visuals
    playSound("win");
    confetti({ particleCount: 150, spread: 100, origin: { y: 0.5 }, zIndex: 2000 });
    
    document.getElementById("chestEmoji").classList.remove("shake-anim");
    document.getElementById("chestEmoji").innerText = (bonusMins === 15) ? "💎" : "🎉";
    
    let resultText = document.getElementById("chestResult");
    if(bonusMins === 15) resultText.innerText = "JACKPOT! +" + bonusMins + " Mins! 💰";
    else if(bonusMins === 10) resultText.innerText = "EPIC! +" + bonusMins + " Mins! 🔥";
    else resultText.innerText = "Nice! +" + bonusMins + " Mins! 🎮";
    
    resultText.style.display = "block";

    let btn = document.getElementById("chestBtn");
    btn.innerText = "Awesome! ➡️";
    btn.onclick = closeChestModal;
    document.getElementById("chestEmoji").onclick = closeChestModal;
}

function closeChestModal() {
    document.getElementById("chestModal").style.display = "none";
    if (mode === "timed" && !isGameOverState) timerInterval = setInterval(updateTimer, 1000); // Resume timer
    advanceGameFlow(); // Move to the next question or game over screen
}


function updateDisplays() {
    document.getElementById("score").innerText = "Score: " + score;
    document.getElementById("streak").innerText = "Streak: " + streak + " 🔥";
    document.getElementById("xpBar").style.width = (xp % 10) * 10 + "%";
}

function showQ(displayTxt, speechTxt) {
    document.getElementById("question").innerText = displayTxt;
    currentSpeechText = speechTxt || displayTxt; 
}

function speakQuestion() {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        let utterance = new SpeechSynthesisUtterance(currentSpeechText);
        utterance.rate = 0.85; 
        window.speechSynthesis.speak(utterance);
    }
}

function newQuestion() {
    isProcessing = false;
    document.getElementById("reward").innerText = "";
    document.getElementById("correction").innerText = "";
    document.getElementById("answer").value = "";
    document.getElementById("answer").className = ""; 

    let activeTopic = topic;
    if (topic === "mixed") activeTopic = allTopics[rand(allTopics.length)];
    
    currentQuestionTopic = activeTopic; 
    let lvl = levelNumber; 

    if(activeTopic==="addition"){
        if(levelType==="young"){
            let a=rand(10 + lvl*2); let b=rand(10 + lvl*2); correctAnswer=a+b; 
            showQ(a+" + "+b, a+" plus "+b);
        } else {
            let a=rand(50 + lvl*10)+10; let b=rand(50 + lvl*10)+10; correctAnswer=a+b; 
            showQ(a+" + "+b, a+" plus "+b);
        }
    }
    else if(activeTopic==="subtraction"){
        if(levelType==="young"){
            let a=rand(15 + lvl*2); let b=rand(a+1); correctAnswer=a-b; 
            showQ(a+" - "+b, a+" minus "+b);
        } else {
            let a=rand(50 + lvl*5)+10; let b=rand(a+1); correctAnswer=a-b; 
            showQ(a+" - "+b, a+" minus "+b);
        }
    }
    else if(activeTopic==="multiplication"){
        if(levelType==="young"){
            let tables=[2,5,10]; let a=tables[rand(3)]; let b=rand(5 + lvl); correctAnswer=a*b; 
            showQ(a+" × "+b, a+" times "+b);
        } else {
            let tables=[2,3,4,5,6,7,8,9,10]; 
            let a=tables[rand(Math.min(tables.length, 3 + lvl))]; let b=rand(12); correctAnswer=a*b; 
            showQ(a+" × "+b, a+" times "+b);
        }
    }
    else if(activeTopic==="division"){
        if(levelType==="young"){
            let tables=[2,5,10]; let b=tables[rand(3)]; let a=rand(6); correctAnswer=a; 
            showQ((a*b)+" ÷ "+b, (a*b)+" divided by "+b);
        } else {
            let tables=[2,3,4,5,6,7,8,9,10]; let b=tables[rand(Math.min(tables.length, 3 + lvl))]; let a=rand(11); correctAnswer=a; 
            showQ((a*b)+" ÷ "+b, (a*b)+" divided by "+b);
        }
    }
    else if(activeTopic==="fractions"){
        if(levelType==="young"){
            let n=(rand(5 + lvl)+1)*2; correctAnswer=n/2; showQ("Half of "+n);
        } else {
            let n=(rand(5 + lvl)+1)*4; correctAnswer=n/4; showQ("Quarter of "+n);
        }
    }
    else if(activeTopic==="money"){
        if(levelType==="young"){
            let a=rand(10)+1; let b=rand(10)+1; correctAnswer=a+b; 
            showQ("What is $"+a+" + $"+b+"?", a+" dollars plus "+b+" dollars");
        } else {
            let a=rand(20)+1; let b=rand(20)+1; correctAnswer=a+b; 
            showQ("What is $"+a+".00 + $"+b+".00?", a+" dollars plus "+b+" dollars");
        }
    }
    else if(activeTopic==="time"){
        if(levelType==="young"){
            let h=rand(12)+1;
            if(rand(2)===0){ correctAnswer=h+":00"; showQ(h+" o'clock"); }
            else{ correctAnswer=h+":30"; showQ("Half past "+h); }
        } else {
            let h=rand(12)+1; let m=rand(12)*5; 
            correctAnswer=h+":"+String(m).padStart(2,"0");
            showQ(h+" hr "+m+" min = ?", "Write the time for "+h+" hours and "+m+" minutes");
        }
    }
    else if(activeTopic==="patterns"){
        let start=rand(10 + lvl)+1; let step= (levelType==="young") ? [2,5][rand(2)] : rand(5)+2; 
        correctAnswer=start+3*step;
        showQ(start+", "+(start+step)+", "+(start+2*step)+", ?", "What comes next?");
    }
    else if(activeTopic==="geometry"){
        let shapes=[ {name:"triangle",sides:3}, {name:"square",sides:4}, {name:"pentagon",sides:5}, {name:"hexagon",sides:6}, {name:"octagon",sides:8} ];
        let s=shapes[rand(shapes.length)]; correctAnswer=s.sides; 
        showQ("Sides on a "+s.name+"?", "How many sides does a "+s.name+" have?");
    }
    else if(activeTopic==="measurement"){
        if(levelType==="young"){
            let cm=rand(10)+1; correctAnswer=cm*10; 
            showQ("mm in "+cm+" cm?", "How many millimeters are in "+cm+" centimeters?");
        } else {
            let m=rand(5)+1; let cm=m*100; correctAnswer=m; 
            showQ(cm+" cm = ? m", "How many meters is "+cm+" centimeters?");
        }
    }
    else if(activeTopic==="rounding"){
        let n = rand(50 + lvl*10);
        if(levelType==="young"){
            correctAnswer=Math.round(n/10)*10; showQ("Round "+n+" to nearest 10");
        } else {
            if(rand(2)===0){ correctAnswer=Math.round(n/10)*10; showQ("Round "+n+" to 10"); }
            else{ correctAnswer=Math.round(n/100)*100; showQ("Round "+n+" to 100"); }
        }
    }
    else if(activeTopic==="logic"){
        let a=rand(10)+1; let b=a+3; let c=b+3; correctAnswer=c+3; 
        showQ(a+", "+b+", "+c+", ?", "What comes next?");
    }
}

function addNumber(n){ if(!isProcessing) document.getElementById("answer").value+=n; }
function clearAnswer(){ if(!isProcessing) document.getElementById("answer").value=""; }
function backspace(){ if(!isProcessing) { let v=document.getElementById("answer").value; document.getElementById("answer").value=v.slice(0,-1); } }

function checkFuzzyMatch(userInput, actualAnswer, currentTopic) {
    userInput = String(userInput).trim(); actualAnswer = String(actualAnswer).trim();
    if (userInput === actualAnswer) return true;
    if (Number(userInput) === Number(actualAnswer) && !isNaN(Number(actualAnswer)) && userInput !== "") return true; 

    if (currentTopic === "time" || actualAnswer.includes(":")) {
        let uParts = userInput.split(":"); let cParts = actualAnswer.split(":");
        if (uParts.length === 2 && cParts.length === 2) {
            if (Number(uParts[0]) === Number(cParts[0]) && Number(uParts[1]) === Number(cParts[1])) return true;
        }
        let uClean = userInput.replace(/[^0-9]/g, ""); let cClean = actualAnswer.replace(/[^0-9]/g, "");
        if (uClean === cClean && Number(uClean) > 0) return true; 
    }
    return false;
}

function submitAnswer() {
    if (isGameOverState || isProcessing) return;

    let inputEl = document.getElementById("answer");
    let user = inputEl.value;
    if (user.trim() === "") return;

    isProcessing = true; 
    let leveledUp = false;

    if (checkFuzzyMatch(user, correctAnswer, currentQuestionTopic)) {
        score++; streak++; xp++;
        
        let p = document.getElementById("player").value;
        ps5Data[p] += 2; // Base rate: +2 Mins
        localStorage.setItem("mathGamePS5Bank", JSON.stringify(ps5Data));
        updatePS5Display();
        
        let bankEl = document.getElementById("ps5Bank");
        bankEl.classList.remove("pulse-anim"); void bankEl.offsetWidth; bankEl.classList.add("pulse-anim");

        playSound("win");
        document.getElementById("reward").innerText = currentRewards[rand(currentRewards.length)] + " (+2 Mins!)";
        document.getElementById("reward").style.color = (player === "clariza") ? "#d1478e" : "#cc3700";
        inputEl.classList.add("input-correct");
    } else {
        streak = 0;
        playSound("lose");
        document.getElementById("reward").innerText = "❌ Oops!";
        document.getElementById("reward").style.color = "#d32f2f";
        document.getElementById("correction").innerText = "Answer: " + correctAnswer;
        inputEl.classList.add("input-wrong");
    }

    if (xp > 0 && xp % 10 === 0) { 
        levelNumber++; 
        leveledUp = true; 
        updatePet(); // Pet hatches or evolves!
    }
    
    updateDisplays();

    let delay = (checkFuzzyMatch(user, correctAnswer, currentQuestionTopic)) ? 1000 : 2200;

    // Check if we hit a chest event
    if (leveledUp) {
        setTimeout(showChestModal, delay); // Show chest after the short delay
    } else {
        setTimeout(advanceGameFlow, delay);
    }
}

// Proceeds to next question OR game over
function advanceGameFlow() {
    if (mode === "10q" || mode === "20q") {
        let totalQs = (mode === "10q") ? 10 : 20;
        if (questionsAnswered >= totalQs) {
            triggerGameOver();
            return;
        } else {
            questionsAnswered++;
            document.getElementById("timer").innerText = "📋 Question " + questionsAnswered + " / " + totalQs;
        }
    }
    newQuestion();
}

document.addEventListener("keydown", function(e) {
    if(isGameOverState) return;
    if(e.key >= "0" && e.key <= "9") { addNumber(e.key); }
    if(e.key === "Backspace") { backspace(); }
    if(e.key === "Enter") { submitAnswer(); }
    if(e.key === "Escape") { clearAnswer(); }
    if(e.key === ".") { addNumber("."); }
    if(e.key === ":") { addNumber(":"); }
});

checkWeeklyReset();
applyTheme();

</script>
