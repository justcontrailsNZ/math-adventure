<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Adventure NZ</title>
<style>
body{font-family:Arial;text-align:center;margin:0;padding:10px;background:#e9f6ff;}
select,button,input{font-size:16px;padding:8px;margin:4px;border-radius:8px;}
#question{font-size:24px;margin:10px;font-weight:bold;}
#answer{font-size:26px;width:160px;text-align:center;}
#reward{font-size:20px;height:25px;}
#correction{color:#c00;height:20px;}
#keypad{display:grid;grid-template-columns:repeat(3,75px);gap:8px;justify-content:center;margin:10px;}
.key{font-size:22px;padding:12px;background:white;border-radius:10px;border:2px solid #bbb;cursor:pointer;}
#xpBarContainer{width:250px;height:15px;background:#ddd;margin:6px auto;border-radius:10px;}
#xpBar{height:100%;width:0%;background:limegreen;border-radius:10px;transition:width 0.3s;}
</style>
</head>
<body>

<h1>🌟 Math Adventure NZ</h1>

Player
<select id="player">
<option value="clariza">Clariza (Year 2)</option>
<option value="jace">Jace (Year 4)</option>
</select>

Topic
<select id="topic">
<option value="addition">Addition</option>
<option value="subtraction">Subtraction</option>
<option value="multiplication">Multiplication</option>
<option value="division">Division</option>
<option value="fractions">Fractions</option>
<option value="money">Money (NZD)</option>
<option value="time">Time</option>
<option value="patterns">Patterns</option>
<option value="geometry">Geometry</option>
<option value="measurement">Measurement</option>
<option value="rounding">Rounding</option>
<option value="logic">Logic</option>
</select>

Mode
<select id="mode">
<option value="timed">Timed (60s)</option>
<option value="practice">Practice</option>
</select>

<br>
<button onclick="startGame()">Start Adventure</button>

<div id="levelDisplay"></div>
<div id="xpBarContainer"><div id="xpBar"></div></div>

<div id="question"></div>
<div id="reward"></div>
<div id="correction"></div>

<input id="answer">

<div id="keypad">
<div class="key" onclick="addNumber('1')">1</div>
<div class="key" onclick="addNumber('2')">2</div>
<div class="key" onclick="addNumber('3')">3</div>
<div class="key" onclick="addNumber('4')">4</div>
<div class="key" onclick="addNumber('5')">5</div>
<div class="key" onclick="addNumber('6')">6</div>
<div class="key" onclick="addNumber('7')">7</div>
<div class="key" onclick="addNumber('8')">8</div>
<div class="key" onclick="addNumber('9')">9</div>
<div class="key" onclick="clearAnswer()">C</div>
<div class="key" onclick="addNumber('0')">0</div>
<div class="key" onclick="backspace()">⌫</div>
</div>

<br>
<button onclick="submitAnswer()">Submit ✅</button>

<div id="score"></div>
<div id="timer"></div>
<div id="streak"></div>

<script>

let score=0,xp=0,levelNumber=1,streak=0;
let correctAnswer=0,player="",levelType="",topic="",mode="";
let timeLeft=60,timerInterval=null;

function rand(max){return Math.floor(Math.random()*max);}

function startGame(){
player=document.getElementById("player").value;
topic=document.getElementById("topic").value;
mode=document.getElementById("mode").value;
levelType=player==="clariza"?"young":"older";
score=0;xp=0;levelNumber=1;streak=0;timeLeft=60;
clearInterval(timerInterval);
updateDisplays();
newQuestion();
if(mode==="timed"){
timerInterval=setInterval(updateTimer,1000);
}else{
document.getElementById("timer").innerText="Practice Mode";
}
}

function updateTimer(){
timeLeft--;
document.getElementById("timer").innerText="Time: "+timeLeft;
if(timeLeft<=0){clearInterval(timerInterval);alert("Final Score: "+score);}
}

function updateDisplays(){
document.getElementById("score").innerText="Score: "+score;
document.getElementById("streak").innerText="Streak: "+streak;
document.getElementById("levelDisplay").innerText="Level "+levelNumber;
document.getElementById("xpBar").style.width=(xp%10)*10+"%";
}

function newQuestion(){

document.getElementById("reward").innerText="";
document.getElementById("correction").innerText="";
document.getElementById("answer").value="";

/* ADDITION */
if(topic==="addition"){
if(levelType==="young"){
let a=rand(21); let b=rand(21);
correctAnswer=a+b;
showQ(a+" + "+b);
}else{
let a=rand(1000); let b=rand(1000);
correctAnswer=a+b;
showQ(a+" + "+b);
}
}

/* SUBTRACTION */
else if(topic==="subtraction"){
if(levelType==="young"){
let a=rand(21); let b=rand(a+1);
correctAnswer=a-b;
showQ(a+" - "+b);
}else{
let a=rand(1000); let b=rand(1000);
if(b>a){let t=a;a=b;b=t;}
correctAnswer=a-b;
showQ(a+" - "+b);
}
}

/* MULTIPLICATION */
else if(topic==="multiplication"){
if(levelType==="young"){
let tables=[2,5,10];
let a=tables[rand(3)];
let b=rand(11);
correctAnswer=a*b;
showQ(a+" × "+b);
}else{
let a=rand(11)+2;
let b=rand(13);
correctAnswer=a*b;
showQ(a+" × "+b);
}
}

/* DIVISION */
else if(topic==="division"){
if(levelType==="young"){
let tables=[2,5,10];
let b=tables[rand(3)];
let a=rand(6);
correctAnswer=a;
showQ((a*b)+" ÷ "+b);
}else{
let b=rand(11)+2;
let a=rand(13);
correctAnswer=a;
showQ((a*b)+" ÷ "+b);
}
}

/* FRACTIONS */
else if(topic==="fractions"){
if(levelType==="young"){
let n=(rand(10)+1)*2;
correctAnswer=n/2;
showQ("Half of "+n);
}else{
let n=(rand(10)+1)*4;
correctAnswer=n/4;
showQ("Quarter of "+n);
}
}

/* MONEY */
else if(topic==="money"){
if(levelType==="young"){
let a=rand(10)+1; let b=rand(10)+1;
correctAnswer=a+b;
showQ("$"+a+" + $"+b);
}else{
let a=(Math.random()*20).toFixed(2);
let b=(Math.random()*20).toFixed(2);
correctAnswer=(parseFloat(a)+parseFloat(b)).toFixed(2);
showQ("$"+a+" + $"+b);
}
}

/* TIME */
else if(topic==="time"){
if(levelType==="young"){
let h=rand(12)+1;
if(rand(2)===0){
correctAnswer=h+":00";
showQ(h+" o'clock");
}else{
correctAnswer=h+":30";
showQ("Half past "+h);
}
}else{
let h=rand(12)+1;
let m=rand(12)*5;
correctAnswer=h+":"+String(m).padStart(2,"0");
showQ("Write time: "+h+" hour "+m+" minutes");
}
}

/* PATTERNS */
else if(topic==="patterns"){
if(levelType==="young"){
let start=rand(10)+1;
let step=[2,5][rand(2)];
correctAnswer=start+3*step;
showQ(start+", "+(start+step)+", "+(start+2*step)+", ?");
}else{
let start=rand(20)+1;
let step=rand(10)+2;
correctAnswer=start+3*step;
showQ(start+", "+(start+step)+", "+(start+2*step)+", ?");
}
}

/* GEOMETRY */
else if(topic==="geometry"){
let shapes=[
{name:"triangle",sides:3},
{name:"square",sides:4},
{name:"pentagon",sides:5},
{name:"hexagon",sides:6}
];
let s=shapes[rand(shapes.length)];
correctAnswer=s.sides;
showQ("How many sides does a "+s.name+" have?");
}

/* MEASUREMENT */
else if(topic==="measurement"){
if(levelType==="young"){
let cm=rand(100);
correctAnswer=cm;
showQ("How many cm in "+cm+" cm?");
}else{
let cm=rand(200);
correctAnswer=(cm/100).toFixed(2);
showQ(cm+" cm = ? m");
}
}

/* ROUNDING */
else if(topic==="rounding"){
if(levelType==="young"){
let n=rand(100);
correctAnswer=Math.round(n/10)*10;
showQ("Round "+n+" to nearest 10");
}else{
let n=rand(1000);
if(rand(2)===0){
correctAnswer=Math.round(n/10)*10;
showQ("Round "+n+" to nearest 10");
}else{
correctAnswer=Math.round(n/100)*100;
showQ("Round "+n+" to nearest 100");
}
}
}

/* LOGIC */
else if(topic==="logic"){
let a=rand(10)+1;
let b=a+3;
let c=b+3;
correctAnswer=c+3;
showQ(a+", "+b+", "+c+", ?");
}

}

function showQ(t){document.getElementById("question").innerText=t;}

function addNumber(n){document.getElementById("answer").value+=n;}
function clearAnswer(){document.getElementById("answer").value="";}
function backspace(){let v=document.getElementById("answer").value;document.getElementById("answer").value=v.slice(0,-1);}

function submitAnswer(){
let user=document.getElementById("answer").value.trim();
if(user==="") return;

if(user==correctAnswer){
score++;streak++;xp++;
document.getElementById("reward").innerText="⭐ Correct!";
}else{
streak=0;
document.getElementById("reward").innerText="❌ Incorrect";
document.getElementById("correction").innerText="Answer: "+correctAnswer;
}

if(xp%10===0){levelNumber++;}

updateDisplays();
setTimeout(newQuestion,1000);
}

document.addEventListener("keydown",function(e){
if(e.key>="0"&&e.key<="9"){addNumber(e.key);}
if(e.key==="Backspace"){backspace();}
if(e.key==="Enter"){submitAnswer();}
if(e.key==="Escape"){clearAnswer();}
if(e.key==="."){addNumber(".");}
if(e.key===":"){addNumber(":");}
});

</script>

</body>
</html>
