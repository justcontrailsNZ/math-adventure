<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Adventure</title>

<style>
body{
font-family:Arial;
text-align:center;
margin:0;
padding:15px;
background:#e9f6ff;
}

h1{margin:5px;}

select,button,input{
font-size:18px;
padding:8px;
margin:5px;
}

#character{font-size:60px;margin:5px;}
#question{font-size:28px;margin:15px;}
#reward{font-size:28px;height:35px;}

#answer{
font-size:28px;
width:160px;
text-align:center;
}

#keypad{
display:grid;
grid-template-columns:repeat(3, 80px);
gap:10px;
justify-content:center;
margin-top:15px;
}

.key{
font-size:26px;
padding:15px;
background:#ffffff;
border-radius:10px;
border:2px solid #ccc;
cursor:pointer;
user-select:none;
}

.key:active{
background:#ddd;
}
</style>
</head>

<body>

<h1>🌟 Math Adventure</h1>

Player
<select id="player">
<option value="clariza">Clariza (Year 2)</option>
<option value="jace">Jace (Year 4)</option>
</select>

Topic
<select id="topic">
<option value="addition">Addition</option>
<option value="subtraction">Subtraction</option>
<option value="multiplication">Multiplication</option>
<option value="division">Division</option>
</select>

Mode
<select id="mode">
<option value="timed">Timed (60s)</option>
<option value="practice">Practice</option>
</select>

<br>
<button onclick="startGame()">Start Adventure</button>

<div id="character"></div>
<div id="question"></div>
<div id="reward"></div>

<input id="answer">

<div id="keypad">
<div class="key" onclick="addNumber('1')">1</div>
<div class="key" onclick="addNumber('2')">2</div>
<div class="key" onclick="addNumber('3')">3</div>

<div class="key" onclick="addNumber('4')">4</div>
<div class="key" onclick="addNumber('5')">5</div>
<div class="key" onclick="addNumber('6')">6</div>

<div class="key" onclick="addNumber('7')">7</div>
<div class="key" onclick="addNumber('8')">8</div>
<div class="key" onclick="addNumber('9')">9</div>

<div class="key" onclick="clearAnswer()">C</div>
<div class="key" onclick="addNumber('0')">0</div>
<div class="key" onclick="backspace()">⌫</div>
</div>

<br>
<button onclick="submitAnswer()">Submit ✅</button>

<div id="score"></div>
<div id="timer"></div>
<div id="streak"></div>

<script>
let score=0;
let streak=0;
let correctAnswer=0;
let player="";
let levelType="";
let topic="";
let mode="";
let timeLeft=60;
let timerInterval=null;

/* ✅ SOUND SYSTEM */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq,duration){
let osc = audioCtx.createOscillator();
let gain = audioCtx.createGain();

osc.frequency.value=freq;
osc.type="sine";

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();
gain.gain.setValueAtTime(0.3,audioCtx.currentTime);
osc.stop(audioCtx.currentTime+duration);
}

/* ✅ START GAME */
function startGame(){

// unlock audio on first interaction (tablet requirement)
audioCtx.resume();

player=document.getElementById("player").value;
topic=document.getElementById("topic").value;
mode=document.getElementById("mode").value;
levelType=player==="clariza"?"young":"older";

score=0;
streak=0;
timeLeft=60;
clearInterval(timerInterval);

updateTheme();
updateDisplays();
newQuestion();

if(mode==="timed"){
timerInterval=setInterval(updateTimer,1000);
}else{
document.getElementById("timer").innerText="Practice Mode";
}
}

function updateTheme(){
if(player==="clariza"){
document.body.style.background="#ffe6f2";
document.getElementById("character").innerText="🦄";
}else{
document.body.style.background="#e6ffe6";
document.getElementById("character").innerText="🦖";
}
}

function updateDisplays(){
document.getElementById("score").innerText="Score: "+score;
document.getElementById("streak").innerText="Streak: "+streak+" 🔥";
}

function updateTimer(){
timeLeft--;
document.getElementById("timer").innerText="Time: "+timeLeft;
if(timeLeft<=0){
clearInterval(timerInterval);
alert("Time's up! Final Score: "+score);
}
}

function newQuestion(){

let max=levelType==="young"?20:100;
let a=Math.floor(Math.random()*max);
let b=Math.floor(Math.random()*max);

if(topic==="addition"){
correctAnswer=a+b;
document.getElementById("question").innerText=a+" + "+b;
}
if(topic==="subtraction"){
if(b>a){let t=a;a=b;b=t;}
correctAnswer=a-b;
document.getElementById("question").innerText=a+" - "+b;
}
if(topic==="multiplication"){
a=Math.floor(Math.random()*(levelType==="young"?6:12))+1;
b=Math.floor(Math.random()*(levelType==="young"?6:12))+1;
correctAnswer=a*b;
document.getElementById("question").innerText=a+" × "+b;
}
if(topic==="division"){
a=Math.floor(Math.random()*(levelType==="young"?6:12))+1;
b=Math.floor(Math.random()*(levelType==="young"?6:12))+1;
correctAnswer=a;
document.getElementById("question").innerText=(a*b)+" ÷ "+b;
}

clearAnswer();
}

function addNumber(num){
playTone(500,0.05);
document.getElementById("answer").value+=num;
}

function clearAnswer(){
playTone(300,0.05);
document.getElementById("answer").value="";
}

function backspace(){
playTone(300,0.05);
let val=document.getElementById("answer").value;
document.getElementById("answer").value=val.slice(0,-1);
}

function submitAnswer(){
let user=document.getElementById("answer").value.trim();
if(user==="") return;

if(parseFloat(user)===correctAnswer){
score++;
streak++;
document.getElementById("reward").innerText="⭐";
playTone(800,0.2); // correct sound
}else{
streak=0;
document.getElementById("reward").innerText="❌";
playTone(150,0.3); // wrong sound
}

updateDisplays();
setTimeout(newQuestion,600);
}

/* ✅ Keyboard Support */
document.addEventListener("keydown",function(e){

if(e.key>="0" && e.key<="9"){
addNumber(e.key);
}

if(e.key==="Backspace"){
backspace();
}

if(e.key==="Enter"){
submitAnswer();
}

if(e.key==="Escape"){
clearAnswer();
}

});
</script>

</body>
</html>
