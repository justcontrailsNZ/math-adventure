<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Adventure NZ</title>
<!-- Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- 3 Fun Fonts that will change daily -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');

body {
    /* Font will be injected via Javascript based on the day */
    text-align: center;
    margin: 0;
    padding: 10px;
    background: #e9f6ff;
    transition: background 0.5s ease, font-family 0.5s ease;
}

#gameContainer {
    background: rgba(255, 255, 255, 0.92);
    max-width: 400px;
    margin: 0 auto;
    padding: 20px 10px;
    border-radius: 20px;
    box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
}

h1 { margin-top: 5px; font-size: 28px; }

select, button, input {
    font-family: inherit; /* Inherits the daily font */
    font-size: 16px;
    padding: 8px;
    margin: 4px;
    border-radius: 8px;
    border: 2px solid #ccc;
}

#question { font-size: 32px; font-weight: bold; color: #333; margin: 0; }
#answer { font-size: 28px; width: 160px; text-align: center; border: 3px solid #ccc; outline: none; font-family: inherit; }
#reward { font-size: 24px; height: 30px; font-weight: bold; margin-bottom: 5px;}
#correction { color: #c00; height: 20px; font-weight: bold; font-size: 18px; }

#keypad { display: grid; grid-template-columns: repeat(4, 70px); gap: 8px; justify-content: center; margin: 15px auto; }
.key {
    font-size: 24px;
    font-weight: bold;
    padding: 12px;
    background: white;
    border-radius: 12px;
    border: 2px solid #bbb;
    cursor: pointer;
    box-shadow: 0px 4px 0px #bbb;
    transition: transform 0.1s, box-shadow 0.1s;
    user-select: none;
    font-family: inherit;
}
.key:active { transform: translateY(4px); box-shadow: 0px 0px 0px #bbb; }

#xpBarContainer { width: 250px; height: 20px; background: #ddd; margin: 10px auto; border-radius: 10px; overflow: hidden; border: 2px solid #999;}
#xpBar { height: 100%; width: 0%; background: limegreen; border-radius: 10px; transition: width 0.3s; }

.theme-jace-btn { background: #ff4500 !important; color: white !important; border-color: #cc3700 !important; }
.theme-clariza-btn { background: #ff69b4 !important; color: white !important; border-color: #d1478e !important; }

#speakerBtn {
    background: none; border: none; font-size: 28px; cursor: pointer;
    margin-left: 10px; transition: transform 0.2s; box-shadow: none; padding: 0;
}
#speakerBtn:hover { transform: scale(1.2); }
#speakerBtn:active { transform: scale(0.9); }

/* Custom Modal Victory Screen */
#gameOverModal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); z-index: 1000;
    display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
}
#modalContent {
    background: white; padding: 30px; border-radius: 25px;
    text-align: center; max-width: 85%; width: 320px;
    box-shadow: 0px 15px 30px rgba(0,0,0,0.5);
    border: 5px solid #ffcc00;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
#modalTitle { font-size: 28px; margin-top: 0; color: #333; }
#modalStars { font-size: 50px; margin: 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
#modalScoreText { font-size: 22px; font-weight: bold; color: #555; }

</style>
</head>
<body>

<div id="gameContainer">
    <h1 id="gameTitle">🌟 Math Adventure</h1>

    <div>
        <select id="player" onchange="applyTheme()">
            <option value="clariza">Clariza (Year 2)</option>
            <option value="jace">Jace (Year 4)</option>
        </select>

        <select id="topic">
            <option value="mixed">🔀 Surprise Mix!</option>
            <option value="addition">Addition</option>
            <option value="subtraction">Subtraction</option>
            <option value="multiplication">Multiplication</option>
            <option value="division">Division</option>
            <option value="fractions">Fractions</option>
            <option value="money">Money (NZD)</option>
            <option value="time">Time</option>
            <option value="patterns">Patterns</option>
            <option value="geometry">Geometry</option>
            <option value="measurement">Measurement</option>
            <option value="rounding">Rounding</option>
            <option value="logic">Logic</option>
        </select>
    </div>

    <div>
        <select id="mode">
            <option value="10q">10 Questions</option>
            <option value="timed">Timed (60s)</option>
            <option value="practice">Practice</option>
        </select>
    </div>

    <button id="startBtn" onclick="startGame()" style="background:#4CAF50; color:white; font-size:18px; font-weight:bold; margin-top:10px; cursor:pointer;">Start Adventure! 🚀</button>

    <div id="levelDisplay" style="margin-top:15px; font-weight:bold; font-size:18px;">Level 1</div>
    <div id="xpBarContainer"><div id="xpBar"></div></div>

    <div style="display:flex; justify-content:center; align-items:center; margin: 15px 0;">
        <div id="question">?</div>
        <button id="speakerBtn" onclick="speakQuestion()" title="Read Out Loud">🔊</button>
    </div>

    <div id="reward"></div>
    <div id="correction"></div>

    <input id="answer" autocomplete="off" readonly placeholder="...">

    <div id="keypad">
        <div class="key" onclick="addNumber('1')">1</div>
        <div class="key" onclick="addNumber('2')">2</div>
        <div class="key" onclick="addNumber('3')">3</div>
        <div class="key" style="background:#ffcccc; color:#c00; border-color:#d99;" onclick="clearAnswer()">C</div>
        
        <div class="key" onclick="addNumber('4')">4</div>
        <div class="key" onclick="addNumber('5')">5</div>
        <div class="key" onclick="addNumber('6')">6</div>
        <div class="key" style="background:#ffdd99; border-color:#d9b366;" onclick="backspace()">⌫</div>
        
        <div class="key" onclick="addNumber('7')">7</div>
        <div class="key" onclick="addNumber('8')">8</div>
        <div class="key" onclick="addNumber('9')">9</div>
        <div class="key" onclick="addNumber('.')">.</div>

        <div style="visibility:hidden;"></div>
        <div class="key" onclick="addNumber('0')">0</div>
        <div style="visibility:hidden;"></div>
        <div class="key" onclick="addNumber(':')">:</div>
    </div>

    <button id="submitBtn" style="background:#4CAF50; color:white; font-weight:bold; font-size:20px; padding:10px 30px; cursor:pointer; border-radius:12px;" onclick="submitAnswer()">Submit ✅</button>

    <div style="display:flex; justify-content:space-between; margin-top:20px; padding:0 15px;">
        <div id="score" style="font-weight:bold; font-size:18px; color:#333;">Score: 0</div>
        <div id="highScoreDisplay" style="font-weight:bold; font-size:18px; color:#555;">Best: 0 🏆</div>
        <div id="streak" style="font-weight:bold; font-size:18px; color:#ff8c00;">Streak: 0 🔥</div>
    </div>
    
    <div id="timer" style="font-weight:bold; font-size:18px; margin-top:10px; color:#555;">Choose mode & press Start</div>

</div>

<!-- The Victory Modal -->
<div id="gameOverModal">
    <div id="modalContent">
        <h2 id="modalTitle">Game Over!</h2>
        <div id="modalStars">⭐⭐⭐</div>
        <p id="modalScoreText">You scored X points!</p>
        <button id="playAgainBtn" style="background:#4CAF50; color:white; font-size:20px; font-weight:bold; padding:10px 20px; border-radius:12px; border:none; cursor:pointer; margin-top:10px;" onclick="closeModal()">Play Again 🔄</button>
    </div>
</div>

<script>
let score=0, xp=0, levelNumber=1, streak=0, questionsAnswered=0;
let correctAnswer=0, player="", levelType="", topic="", mode="";
let timeLeft=60, timerInterval=null;
let currentSpeechText = "";
let isGameOverState = true; 

const allTopics = ["addition", "subtraction", "multiplication", "division", "fractions", "money", "time", "patterns", "geometry", "measurement", "rounding", "logic"];

let highScores = JSON.parse(localStorage.getItem("mathGameHighScores")) || { clariza: 0, jace: 0 };

// --- DAILY ROTATION LOGIC ---
const dayOfWeek = new Date().getDay(); // Returns 0 (Sun) to 6 (Sat)
const fonts = ["'Fredoka', sans-serif", "'Bubblegum Sans', cursive", "'Comic Neue', cursive"];
const dailyFont = fonts[dayOfWeek % 3]; // Cycles 3 fonts throughout the week

// 7 Themes for Clariza
const clarizaDaily = [
    { title: "🦄 Clariza's Math 🐶", praises: ["Magic! 🦄", "Wackadoo! 🐶", "Sparkly! ✨", "Hooray! 🌈"] }, // Sun
    { title: "🧜‍♀️ Clariza's Math 🐚", praises: ["Splash! 🌊", "Mer-mazing! 🧜‍♀️", "Beautiful! 🐚", "Wow! 🐠"] }, // Mon
    { title: "🧚‍♀️ Clariza's Math 🌸", praises: ["Fairy Dust! ✨", "So Pretty! 🌸", "Magical! 🧚‍♀️", "Flutter! 🍃"] }, // Tue
    { title: "👸 Clariza's Math 🏰", praises: ["Royal! 👑", "Princess! 👸", "Majestic! 🏰", "Sparkle! 💎"] }, // Wed
    { title: "🌈 Clariza's Math ⭐", praises: ["Glowing! 🌟", "Radiant! 🌈", "Super Star! ⭐", "Bright! ☀️"] }, // Thu
    { title: "🦋 Clariza's Math 🐞", praises: ["Fluttery! 🦋", "Cute! 🐞", "Sweet! 🌷", "Hooray! 🐝"] }, // Fri
    { title: "🐱 Clariza's Math 🐾", praises: ["Purr-fect! 🐱", "Puppy Love! 🐶", "Meow! 🐾", "So Cute! 🐰"] }  // Sat
];

// 7 Themes for Jace
const jaceDaily = [
    { title: "🦖 Jace's Math 🏎️", praises: ["Roar-some! 🦖", "Turbo Speed! 🏎️", "Vroom! 🏁", "Dino-mite! 🦕"] }, // Sun
    { title: "🚀 Jace's Math 👽", praises: ["Blast Off! 🚀", "Out of this World! 🛸", "Alien Tech! 👽", "Cosmic! ☄️"] }, // Mon
    { title: "🤖 Jace's Math ⚙️", praises: ["System Go! 🔋", "Robot Power! 🤖", "Glitch Free! 💻", "Mechanical! ⚙️"] }, // Tue
    { title: "🦸‍♂️ Jace's Math ⚡", praises: ["Heroic! 💥", "Super Strength! 🦸‍♂️", "ZAP! ⚡", "POW! 🥊"] }, // Wed
    { title: "🥷 Jace's Math 🐉", praises: ["Stealthy! 🥷", "Dragon Fire! 🐉", "Ninja Moves! 🗡️", "Swift! 🌪️"] }, // Thu
    { title: "🧟 Jace's Math 👻", praises: ["Spooky! 👻", "Monster Mash! 🧟", "Slime Time! 🦠", "Boo! 🎃"] }, // Fri
    { title: "🏴‍☠️ Jace's Math 🪙", praises: ["Arrrgh! 🏴‍☠️", "Treasure! 💎", "Ahoy! ⚓", "Gold! 🪙"] } // Sat
];

let currentRewards = [];

// --- THEMED AUDIO EFFECTS ---
const sfx = {
    clarizaWin: new Audio("https://assets.mixkit.co/active_storage/sfx/1936/1936-preview.mp3"),
    clarizaLose: new Audio("https://assets.mixkit.co/active_storage/sfx/2840/2840-preview.mp3"),
    jaceWin: new Audio("https://assets.mixkit.co/active_storage/sfx/1466/1466-preview.mp3"),
    jaceLose: new Audio("https://assets.mixkit.co/active_storage/sfx/2951/2951-preview.mp3")
};
Object.values(sfx).forEach(a => a.volume = 0.4);

function playSound(type) {
    let p = document.getElementById("player").value;
    try {
        if (p === "clariza") {
            if (type === "win") { sfx.clarizaWin.currentTime = 0; sfx.clarizaWin.play(); }
            else { sfx.clarizaLose.currentTime = 0; sfx.clarizaLose.play(); }
        } else {
            if (type === "win") { sfx.jaceWin.currentTime = 0; sfx.jaceWin.play(); }
            else { sfx.jaceLose.currentTime = 0; sfx.jaceLose.play(); }
        }
    } catch(e) {} 
}

function rand(max) { return Math.floor(Math.random()*max); }

function applyTheme() {
    let p = document.getElementById("player").value;
    let startBtn = document.getElementById("startBtn");
    let submitBtn = document.getElementById("submitBtn");
    let xpBar = document.getElementById("xpBar");
    let playAgainBtn = document.getElementById("playAgainBtn");

    // Apply the Daily Font
    document.body.style.fontFamily = dailyFont;

    if (p === "clariza") {
        document.body.style.background = "linear-gradient(135deg, #A1C4FD 0%, #ffafbd 100%)";
        document.getElementById("gameTitle").innerText = clarizaDaily[dayOfWeek].title;
        currentRewards = clarizaDaily[dayOfWeek].praises;
        xpBar.style.background = "linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3)";
        startBtn.className = "theme-clariza-btn";
        submitBtn.className = "theme-clariza-btn";
        playAgainBtn.className = "theme-clariza-btn";
        document.getElementById("reward").style.color = "#d1478e";
    } else {
        document.body.style.background = "linear-gradient(135deg, #f12711 0%, #f5af19 100%)";
        document.getElementById("gameTitle").innerText = jaceDaily[dayOfWeek].title;
        currentRewards = jaceDaily[dayOfWeek].praises;
        xpBar.style.background = "repeating-linear-gradient(45deg, #000, #000 10px, #fff 10px, #fff 20px)";
        startBtn.className = "theme-jace-btn";
        submitBtn.className = "theme-jace-btn";
        playAgainBtn.className = "theme-jace-btn";
        document.getElementById("reward").style.color = "#cc3700";
    }
    updateHighScoresDisplay();
}

function updateHighScoresDisplay() {
    let p = document.getElementById("player").value;
    document.getElementById("highScoreDisplay").innerText = "Best: " + (highScores[p] || 0) + " 🏆";
}

function startGame() {
    isGameOverState = false;
    player = document.getElementById("player").value;
    topic = document.getElementById("topic").value;
    mode = document.getElementById("mode").value;
    levelType = player === "clariza" ? "young" : "older";
    
    score = 0; xp = 0; levelNumber = 1; streak = 0; timeLeft = 60; questionsAnswered = 1;
    clearInterval(timerInterval);
    
    applyTheme();
    updateDisplays();
    newQuestion();
    
    if (mode === "timed") {
        document.getElementById("timer").innerText = "Time: " + timeLeft;
        timerInterval = setInterval(updateTimer, 1000);
    } else if (mode === "10q") {
        document.getElementById("timer").innerText = "Question 1 / 10";
    } else {
        document.getElementById("timer").innerText = "Practice Mode";
    }
}

function updateTimer() {
    timeLeft--;
    document.getElementById("timer").innerText = "Time: " + timeLeft;
    if (timeLeft <= 0) {
        clearInterval(timerInterval);
        triggerGameOver();
    }
}

function triggerGameOver() {
    isGameOverState = true;
    let p = document.getElementById("player").value;
    let isHighScore = false;
    let stars = "⭐";
    let title = "Great Try!";
    let scoreText = "";

    if (mode === "timed") {
        if (score > highScores[p]) {
            highScores[p] = score;
            localStorage.setItem("mathGameHighScores", JSON.stringify(highScores));
            isHighScore = true;
            title = "🎉 NEW RECORD! 🎉";
            stars = "⭐⭐⭐";
            scoreText = "Amazing! You scored " + score + " points!";
        } else {
            if(score >= 15) stars = "⭐⭐⭐";
            else if(score >= 5) stars = "⭐⭐";
            title = "Time's Up!";
            scoreText = "Final Score: " + score;
        }
    } else if (mode === "10q") {
        scoreText = "You got " + score + " out of 10 right!";
        if(score === 10) { stars = "⭐⭐⭐"; title = "Perfect! 🏆"; isHighScore = true; }
        else if(score >= 7) { stars = "⭐⭐"; title = "Awesome Job!"; }
        else { stars = "⭐"; title = "Good Practice!"; }
    } else {
        title = "Practice Finished!";
        scoreText = "Questions Answered: " + score;
        stars = "⭐⭐⭐";
    }

    updateHighScoresDisplay();

    document.getElementById("modalTitle").innerText = title;
    document.getElementById("modalStars").innerText = stars;
    document.getElementById("modalScoreText").innerText = scoreText;
    document.getElementById("gameOverModal").style.display = "flex";

    if (isHighScore) {
        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, zIndex: 2000 });
        setTimeout(() => confetti({ particleCount: 100, spread: 100, origin: { y: 0.5 }, zIndex: 2000 }), 500);
    }
}

function closeModal() {
    document.getElementById("gameOverModal").style.display = "none";
    document.getElementById("timer").innerText = "Choose mode & press Start";
    document.getElementById("question").innerText = "?";
    document.getElementById("reward").innerText = "";
    document.getElementById("correction").innerText = "";
    document.getElementById("answer").value = "";
    isGameOverState = true;
}

function updateDisplays() {
    document.getElementById("score").innerText = "Score: " + score;
    document.getElementById("streak").innerText = "Streak: " + streak + " 🔥";
    document.getElementById("levelDisplay").innerText = "Level " + levelNumber;
    document.getElementById("xpBar").style.width = (xp % 10) * 10 + "%";
}

function showQ(displayTxt, speechTxt) {
    document.getElementById("question").innerText = displayTxt;
    currentSpeechText = speechTxt || displayTxt; 
}

function speakQuestion() {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        let utterance = new SpeechSynthesisUtterance(currentSpeechText);
        utterance.rate = 0.85; 
        window.speechSynthesis.speak(utterance);
    }
}

function newQuestion() {
    document.getElementById("reward").innerText = "";
    document.getElementById("correction").innerText = "";
    document.getElementById("answer").value = "";

    let activeTopic = topic;
    if (topic === "mixed") {
        activeTopic = allTopics[rand(allTopics.length)];
    }

    if(activeTopic==="addition"){
        if(levelType==="young"){
            let a=rand(11); let b=rand(11); correctAnswer=a+b; showQ(a+" + "+b, a+" plus "+b);
        }else{
            let a=rand(90)+10; let b=rand(90)+10; correctAnswer=a+b; showQ(a+" + "+b, a+" plus "+b);
        }
    }
    else if(activeTopic==="subtraction"){
        if(levelType==="young"){
            let a=rand(21); let b=rand(a+1); correctAnswer=a-b; showQ(a+" - "+b, a+" minus "+b);
        }else{
            let a=rand(90)+10; let b=rand(a+1); correctAnswer=a-b; showQ(a+" - "+b, a+" minus "+b);
        }
    }
    else if(activeTopic==="multiplication"){
        if(levelType==="young"){
            let tables=[2,5,10]; let a=tables[rand(3)]; let b=rand(11); correctAnswer=a*b; showQ(a+" × "+b, a+" times "+b);
        }else{
            let tables=[2,3,4,5,10]; let a=tables[rand(tables.length)]; let b=rand(11); correctAnswer=a*b; showQ(a+" × "+b, a+" times "+b);
        }
    }
    else if(activeTopic==="division"){
        if(levelType==="young"){
            let tables=[2,5,10]; let b=tables[rand(3)]; let a=rand(6); correctAnswer=a; showQ((a*b)+" ÷ "+b, (a*b)+" divided by "+b);
        }else{
            let tables=[2,3,4,5,10]; let b=tables[rand(tables.length)]; let a=rand(11); correctAnswer=a; showQ((a*b)+" ÷ "+b, (a*b)+" divided by "+b);
        }
    }
    else if(activeTopic==="fractions"){
        if(levelType==="young"){
            let n=(rand(10)+1)*2; correctAnswer=n/2; showQ("Half of "+n);
        }else{
            let n=(rand(10)+1)*4; correctAnswer=n/4; showQ("Quarter of "+n);
        }
    }
    else if(activeTopic==="money"){
        if(levelType==="young"){
            let a=rand(10)+1; let b=rand(10)+1; correctAnswer=a+b; showQ("$"+a+" + $"+b, a+" dollars plus "+b+" dollars");
        }else{
            let a=rand(20)+1; let b=rand(20)+1; correctAnswer=a+b; showQ("$"+a+".00 + $"+b+".00", a+" dollars plus "+b+" dollars");
        }
    }
    else if(activeTopic==="time"){
        if(levelType==="young"){
            let h=rand(12)+1;
            if(rand(2)===0){ correctAnswer=h+":00"; showQ(h+" o'clock"); }
            else{ correctAnswer=h+":30"; showQ("Half past "+h); }
        }else{
            let h=rand(12)+1; let m=rand(12)*5; correctAnswer=h+":"+String(m).padStart(2,"0"); showQ(h+" hr "+m+" min = ?", "Write the time for "+h+" hours and "+m+" minutes");
        }
    }
    else if(activeTopic==="patterns"){
        if(levelType==="young"){
            let start=rand(10)+1; let step=[2,5][rand(2)]; correctAnswer=start+3*step; showQ(start+", "+(start+step)+", "+(start+2*step)+", ?", "What comes next? "+start+", "+(start+step)+", "+(start+2*step));
        }else{
            let start=rand(20)+1; let step=rand(10)+2; correctAnswer=start+3*step; showQ(start+", "+(start+step)+", "+(start+2*step)+", ?", "What comes next? "+start+", "+(start+step)+", "+(start+2*step));
        }
    }
    else if(activeTopic==="geometry"){
        let shapes=[ {name:"triangle",sides:3}, {name:"square",sides:4}, {name:"pentagon",sides:5}, {name:"hexagon",sides:6} ];
        let s=shapes[rand(shapes.length)]; correctAnswer=s.sides; showQ("Sides on a "+s.name+"?", "How many sides does a "+s.name+" have?");
    }
    else if(activeTopic==="measurement"){
        if(levelType==="young"){
            let cm=rand(10)+1; correctAnswer=cm*10; showQ("mm in "+cm+" cm?", "How many millimeters are in "+cm+" centimeters?");
        }else{
            let m=rand(5)+1; let cm=m*100; correctAnswer=m; showQ(cm+" cm = ? m", "How many meters is "+cm+" centimeters?");
        }
    }
    else if(activeTopic==="rounding"){
        if(levelType==="young"){
            let n=rand(50); correctAnswer=Math.round(n/10)*10; showQ("Round "+n+" to nearest 10");
        }else{
            let n=rand(1000);
            if(rand(2)===0){ correctAnswer=Math.round(n/10)*10; showQ("Round "+n+" to 10", "Round "+n+" to the nearest 10"); }
            else{ correctAnswer=Math.round(n/100)*100; showQ("Round "+n+" to 100", "Round "+n+" to the nearest 100"); }
        }
    }
    else if(activeTopic==="logic"){
        let a=rand(10)+1; let b=a+3; let c=b+3; correctAnswer=c+3; showQ(a+", "+b+", "+c+", ?", "What comes next? "+a+", "+b+", "+c);
    }
}

function addNumber(n){ document.getElementById("answer").value+=n; }
function clearAnswer(){ document.getElementById("answer").value=""; }
function backspace(){ let v=document.getElementById("answer").value; document.getElementById("answer").value=v.slice(0,-1); }

function submitAnswer() {
    if (isGameOverState) return;

    let user = document.getElementById("answer").value.trim();
    if (user === "") return;

    if (user == correctAnswer) {
        score++; streak++; xp++;
        playSound("win");
        let randomPraise = currentRewards[rand(currentRewards.length)];
        document.getElementById("reward").innerText = randomPraise;
    } else {
        streak = 0;
        playSound("lose");
        document.getElementById("reward").innerText = "❌ Oops!";
        document.getElementById("correction").innerText = "Answer: " + correctAnswer;
    }

    if (xp % 10 === 0 && xp > 0) { levelNumber++; }
    updateDisplays();

    if (mode === "10q") {
        if (questionsAnswered >= 10) {
            setTimeout(triggerGameOver, 1200);
            return;
        } else {
            questionsAnswered++;
            document.getElementById("timer").innerText = "Question " + questionsAnswered + " / 10";
        }
    }

    setTimeout(newQuestion, 1200);
}

document.addEventListener("keydown", function(e) {
    if(e.key>="0" && e.key<="9") { addNumber(e.key); }
    if(e.key==="Backspace") { backspace(); }
    if(e.key==="Enter") { submitAnswer(); }
    if(e.key==="Escape") { clearAnswer(); }
    if(e.key===".") { addNumber("."); }
    if(e.key===":") { addNumber(":"); }
});

// Run once on load to set today's theme
applyTheme();

</script>
